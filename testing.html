<body>
  <div id="header"></div>

  <h1>Welcome to My Site</h1>

  <div id="footer"></div>

  <script>
    fetch('/header.html')
      .then(res => res.text())
      .then(data => document.getElementById('header').innerHTML = data);

    fetch('/footer.html')
      .then(res => res.text())
      .then(data => document.getElementById('footer').innerHTML = data);
  </script>
</body>
